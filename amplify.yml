version: 1
frontend:
  phases:
    build:
      commands:
        - mkdir -p dist
        - cp -R scripts styles assets dist/
        - cp *.html dist/
        - cp app-shell-preview.html dist/index.html
        - >-
          printf 'window.FS_ENV = { baseUrl: "%s", useMocks: %s, writeMocks: %s, orgBaseUrl: "%s", orgWrites: %s, timelineSource: "%s" };\n'
          "${FS_BASEURL:-/api}" "${FS_USEMOCKS:-true}" "${FS_WRITEMOCKS:-true}" "${FS_ORG_BASEURL:-}" "${FS_ORGWRITES:-false}" "${FS_TIMELINE_SOURCE:-report}"
          > dist/env.js
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
