name: Deploy UI (test)

# Auto-deploy the prototype to the TEST environment on push to main.
# Mirrors deploy-test.sh, but runs in CI with OIDC (no static keys).
on:
  push:
    branches: [main]
    paths:
      - '**/*.html'
      - 'scripts/**'
      - 'styles/**'
      - '.github/workflows/deploy-ui.yml'
  workflow_dispatch: {}        # allow manual run from the Actions tab

permissions:
  id-token: write              # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.UI_DEPLOY_ROLE_ARN }}
          aws-region: ap-southeast-2

      - name: Sync web assets to test bucket
        run: |
          aws s3 sync . s3://fieldsight-web-test-509194952652/ --delete \
            --exclude "*" --include "*.html" --include "scripts/*" --include "styles/*" --exclude "index.html" \
            --cache-control "max-age=60"
          aws s3 cp app-shell-preview.html s3://fieldsight-web-test-509194952652/index.html \
            --content-type text/html --cache-control "max-age=60"

      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E34AAK2PCGPWVZ --paths "/*"
