  <!-- Sprint 8.0.4 — backend mode bootstrap.
       ?mocks=0        → sets FS.api.useMocks = false (requires a real API)
       ?baseUrl=https… → sets FS.api.baseUrl to point at staging or local backend
       ?dev=1          → shows the role switcher (always on in preview; kept for parity)
       ?axe=1          → Sprint 11 A.1: load axe-core via CDN + run on each
                         route change, log WCAG 2.1 AA violations to console.
                         One-off audit tool — never on by default (Q-S11-4).

       The MOCK / LIVE badge in the dev panel is rendered by dev-role-switcher.js
       which reads FS.api.useMocks after this block runs. -->
  <script>
    (function () {
      var params = new URLSearchParams(location.search);

      /* Apply ?baseUrl before any API call can fire. */
      var baseUrlParam = params.get('baseUrl');
      if (baseUrlParam && window.FS && window.FS.api) {
        window.FS.api.baseUrl = baseUrlParam;
      }

      /* ?mocks=0 flips to live-backend mode. */
      if (params.get('mocks') === '0' && window.FS && window.FS.api) {
        window.FS.api.useMocks = false;
      }

      if (params.get('mocks') === '1' && window.FS && window.FS.api) { window.FS.api.useMocks = true; }
      var wm = params.get('writemocks');
      if (wm !== null && window.FS && window.FS.api) { window.FS.api.writeMocks = wm !== '0'; }

      var ob = params.get('orgbaseurl');
      if (ob !== null && window.FS && window.FS.api) { window.FS.api.orgBaseUrl = ob; }
      var ow = params.get('orgwrites');
      if (ow !== null && window.FS && window.FS.api) { window.FS.api.orgWrites = ow !== '0'; }

      /* Sprint 11 A.1 — ?axe=1 loads axe-core dynamically + runs the
         WCAG 2.1 AA audit on every route change. Findings logged to
         the console in an `[axe]` group with violation count + per-
         issue summary. Hidden by default to keep production previews
         clean (Q-S11-4: one-off audit, not permanent). */
      if (params.get('axe') === '1') {
        var s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/axe-core@4.10.0/axe.min.js';
        s.onload = function () {
          function runAudit() {
            if (!window.axe) return;
            window.axe.run(document, {
              runOnly: { type: 'tag', values: ['wcag2a', 'wcag2aa', 'wcag21aa'] },
            }).then(function (res) {
              if (!res.violations || res.violations.length === 0) {
                console.log('%c[axe] ✓ no WCAG 2.1 AA violations on this page',
                  'color: #15803D; font-weight: bold');
                return;
              }
              console.group('%c[axe] ' + res.violations.length + ' WCAG 2.1 AA violations',
                'color: #B91C1C; font-weight: bold');
              res.violations.forEach(function (v) {
                console.warn('• ' + v.id + ' (' + v.impact + '): ' + v.help
                  + '\n  affects ' + v.nodes.length + ' node(s) — ' + v.helpUrl);
              });
              console.groupEnd();
            });
          }
          /* Run on initial load + every hash route change. Debounce
             so a single render-cycle doesn't trigger N audits. */
          var pending = null;
          function schedule() {
            if (pending) clearTimeout(pending);
            pending = setTimeout(runAudit, 600);
          }
          schedule();
          window.addEventListener('hashchange', schedule);
        };
        document.head.appendChild(s);
      }
    })();
  </script>

  <!-- Phase 0 Task 3 — bridge real Cognito session into AuthMock.currentUser
       for live mode. Loaded after auth-mock.js, auth/session.js, AND the
       ?mocks=0/?mocks=1 bootstrap block above (it reads the fully-resolved
       FS.api.useMocks), and before the mount call so the first paint
       already reflects the real signed-in user when one is restored. -->
  <script src="scripts/auth/session-bridge.js?v=4"></script>

  <script>
    (function () {
      /* Default landing navigation. Must run AFTER session-bridge.js:
         on a live-mode session restore, window.AuthMock.currentUser is
         only the real (bridged) user once session-bridge has run — computing
         the landing route before that point used the stale mock role
         instead of the real signed-in user's role. */
      if (!location.hash || location.hash === '#' || location.hash === '#/') {
        var stored;
        try { stored = localStorage.getItem('fs.settings.defaultLanding'); } catch (_) {}
        var landing = stored || window.FS.getDefaultLanding(window.AuthMock.currentUser);
        location.hash = landing;
      }
    })();
  </script>
