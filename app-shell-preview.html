<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FieldSight · AppShell Preview</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Design tokens + AppShell CSS -->
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/app-shell.css" />
  <link rel="stylesheet" href="styles/components.css?v=4" />

  <style>
    /* Ensure full-bleed with no scroll */
    html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }
    #root { height: 100%; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Lucide icons (UMD) -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- FieldSight globals: tokens + roles (load order matters) -->
  <script src="scripts/fs-globals.js"></script>

  <!-- Router + Auth -->
  <script src="scripts/router.js"></script>
  <script src="scripts/auth-mock.js"></script>

  <!-- React components (Babel transpiles JSX in-browser) -->
  <script type="text/babel" src="scripts/left-nav.js?v=2"></script>
  <script type="text/babel" src="scripts/drag-divider.js?v=1"></script>
  <script type="text/babel" src="scripts/components/button.js?v=1"></script>
  <script type="text/babel" src="scripts/components/input.js?v=1"></script>
  <script type="text/babel" src="scripts/components/card.js?v=1"></script>
  <script type="text/babel" src="scripts/components/badge.js?v=1"></script>
  <script type="text/babel" src="scripts/components/avatar.js?v=1"></script>
  <script type="text/babel" src="scripts/dev-role-switcher.js?v=2"></script>
  <script type="text/babel" src="scripts/app-shell.js?v=2"></script>

  <!-- Bootstrap: set default route then mount -->
  <script>
    (function () {
      // If no hash is set, navigate to the default landing for the initial user
      if (!location.hash || location.hash === '#' || location.hash === '#/') {
        var landing = window.FS.getDefaultLanding(window.AuthMock.currentUser);
        location.hash = landing;
      }
    })();
  </script>

  <script type="text/babel">
    // Mount AppShell with dev switcher always visible in preview
    window.FieldSight.mountAppShell('root', { showDevSwitcher: true });
  </script>
</body>
</html>
